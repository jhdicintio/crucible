version: "3"

vars:
  PYTHON: python3

tasks:
  install:
    desc: Install all dependencies
    cmds:
      - poetry install

  test:
    desc: Run tests
    cmds:
      - poetry run pytest {{.CLI_ARGS}}

  test:cov:
    desc: Run tests with coverage
    cmds:
      - poetry run pytest --cov=crucible --cov-report=term-missing {{.CLI_ARGS}}

  lint:
    desc: Run all linters
    cmds:
      - poetry run ruff check crucible/ tests/
      - poetry run ruff format --check crucible/ tests/
      - poetry run mypy crucible/

  fmt:
    desc: Auto-format code
    cmds:
      - poetry run ruff check --fix crucible/ tests/
      - poetry run ruff format crucible/ tests/

  typecheck:
    desc: Run mypy type checking
    cmds:
      - poetry run mypy crucible/

  pre-commit:install:
    desc: Install pre-commit hooks
    cmds:
      - poetry run pre-commit install

  pre-commit:run:
    desc: Run pre-commit on all files
    cmds:
      - poetry run pre-commit run --all-files

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t crucible .

  docker:run:
    desc: Run Docker container
    deps: [docker:build]
    cmds:
      - docker run --rm crucible {{.CLI_ARGS}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ .mypy_cache/ .pytest_cache/ .ruff_cache/
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
