model:
  name: HuggingFaceTB/SmolLM2-135M
  approach: lora

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
  bias: none
  task_type: CAUSAL_LM

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true

training:
  output_dir: outputs/finetuned
  num_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  gradient_accumulation_steps: 4
  max_seq_length: 512
  seed: 42
  fp16: false
  bf16: false
  logging_steps: 10
  eval_steps: 100
  save_steps: 500
  eval_strategy: steps
  log_file: training_log.jsonl
  text_column: formatted_text
